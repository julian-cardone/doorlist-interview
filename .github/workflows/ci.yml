name: CI

# Single entry point for all PR checks. Triggers on the full set of
# pull_request event types including edited.
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

