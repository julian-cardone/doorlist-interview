name: CI

# Single entry point for all PR checks. Triggers on the full set of
# pull_request event types including edited.
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── TypeScript ────────────────────────────────────────────────
      - name: Type check
        run: npx tsc -b

      # ── Formatting ────────────────────────────────────────────────
      - name: Prettier
        run: npx prettier --check .

      # ── Linting ───────────────────────────────────────────────────
      - name: ESLint
        run: npm run lint

      - name: Markdownlint
        run: npx markdownlint-cli2 "**/*.md" "#node_modules"

      - name: Markdown link check
        run: npx markdown-link-check --config .markdown-link-check.json $(find . -name "*.md" -not -path "./node_modules/*")
